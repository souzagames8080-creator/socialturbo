<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 250px;
      font-family: sans-serif;
      padding: 15px;
      background: #f8fafc;
      margin: 0;
    }
    .card {
      background: white;
      border-radius: 12px;
      padding: 15px;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
      text-align: center;
    }
    .logo {
      width: 40px;
      margin-bottom: 10px;
    }
    h2 {
      font-size: 16px;
      color: #1e3a8a;
      margin: 0 0 5px 0;
    }
    p {
      font-size: 12px;
      color: #64748b;
      margin-bottom: 15px;
    }
    button {
      background: #2563eb;
      color: white;
      border: none;
      padding: 10px 15px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
      width: 100%;
      transition: background 0.2s;
    }
    button:hover {
      background: #1d4ed8;
    }
    #status {
      margin-top: 10px;
      font-size: 11px;
      font-weight: bold;
    }
    .success { color: #059669; }
    .error { color: #dc2626; }
  </style>
</head>
<body>
  <div class="card">
    <img src="icon.png" class="logo" alt="Logo">
    <h2>SocialTurbo Pro</h2>
    <p>Conecte sua conta do Facebook com segurança.</p>
    <button id="btnConnect">COPIAR ACESSO</button>
    <div id="status"></div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
