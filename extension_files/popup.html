<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 280px;
      padding: 0;
      margin: 0;
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0f172a;
      color: white;
    }
    .container { padding: 20px; }
    .header { text-align: center; margin-bottom: 15px; }
    .header h1 { 
      font-size: 16px; 
      margin: 0; 
      color: #6366f1; 
      text-transform: uppercase;
      font-style: italic;
      font-weight: 900;
    }
    
    /* Telas */
    #view-login, #view-ready { display: none; }
    
    .input-group { margin-bottom: 15px; }
    label { font-size: 10px; color: #94a3b8; text-transform: uppercase; font-weight: bold; }
    input {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      border-radius: 6px;
      border: 1px solid #334155;
      background: #1e293b;
      color: white;
      box-sizing: border-box;
    }
    
    .btn-primary {
      width: 100%;
      padding: 12px;
      background: #4f46e5;
      color: white;
      border: none;
      border-radius: 8px;
      font-weight: 900;
      cursor: pointer;
      text-transform: uppercase;
      transition: all 0.2s;
    }
    .btn-primary:hover { background: #4338ca; }
    
    .status-msg {
      margin-top: 10px;
      font-size: 11px;
      text-align: center;
      min-height: 15px;
    }
    
    .user-info {
      background: #1e293b;
      padding: 10px;
      border-radius: 8px;
      margin-bottom: 15px;
      font-size: 11px;
      border: 1px solid #334155;
    }
    .btn-logout {
      background: transparent;
      color: #64748b;
      font-size: 10px;
      border: none;
      cursor: pointer;
      margin-top: 5px;
      padding: 0;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>SocialTurbo Pro</h1>
    </div>

    <!-- Tela Inicial de Login -->
    <div id="view-login">
      <div class="input-group">
        <label>Seu E-mail ou Token</label>
        <input type="text" id="token-input" placeholder="seu@email.com">
      </div>
      <button id="btn-save" class="btn-primary">CONFIGURAR AGORA</button>
      <div id="login-status" class="status-msg"></div>
    </div>

    <!-- Tela de Painel (Quando já tem o e-mail) -->
    <div id="view-ready">
      <div class="user-info">
        <div style="color:#94a3b8">Conectado como:</div>
        <div id="display-user" style="font-weight:bold; color:#10b981; margin-top:2px;">-</div>
        <button id="btn-change" class="btn-logout">Trocar conta</button>
      </div>
      <button id="btn-open" class="btn-primary" style="background:#10b981">🚀 ABRIR PAINEL</button>
      <div id="ready-status" class="status-msg"></div>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
