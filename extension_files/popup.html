<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body { width: 320px; padding: 0; margin: 0; font-family: 'Inter', sans-serif; background: #0f172a; color: white; }
    .container { padding: 24px; }
    .header { text-align: center; margin-bottom: 24px; }
    .logo { font-size: 20px; font-weight: 800; font-style: italic; color: #6366f1; letter-spacing: -0.5px; }
    .card { background: #1e293b; border-radius: 16px; padding: 20px; border: 1px solid #334155; }
    h2 { font-size: 16px; margin: 0 0 8px 0; color: #f8fafc; }
    p { font-size: 11px; color: #94a3b8; margin-bottom: 20px; line-height: 1.5; }
    .input-group { margin-bottom: 16px; }
    label { display: block; font-size: 10px; font-weight: 700; color: #6366f1; text-transform: uppercase; margin-bottom: 8px; }
    input { width: 100%; background: #0f172a; border: 1px solid #334155; padding: 12px; border-radius: 12px; color: white; font-size: 12px; box-sizing: border-box; transition: all 0.2s; }
    input:focus { outline: none; border-color: #6366f1; box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.2); }
    button { width: 100%; background: #4f46e5; color: white; border: none; padding: 14px; border-radius: 12px; cursor: pointer; font-weight: 700; font-size: 13px; text-transform: uppercase; transition: all 0.2s; margin-top: 8px; }
    button:hover { background: #4338ca; transform: translateY(-1px); }
    button:active { transform: translateY(0); }
    .status { margin-top: 16px; font-size: 11px; text-align: center; font-weight: 600; min-height: 16px; }
    .success { color: #10b981; }
    .error { color: #ef4444; }
    .loading { color: #6366f1; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="logo">SOCIALTURBO PRO</div>
    </div>
    <div class="card">
      <p>Sincronize sua conta do Facebook com o painel oficial em segundos.</p>
      <div class="input-group">
        <label>Token de Conexão</label>
        <input type="text" id="token" placeholder="Cole seu token aqui...">
      </div>
      <button id="btn">SINCRONIZAR AGORA 🚀</button>
      <div id="status" class="status"></div>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
