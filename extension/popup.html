<!DOCTYPE html>
<html>
<head>
  <style>
    body { width: 200px; padding: 15px; font-family: sans-serif; text-align: center; }
    button { background: #2563eb; color: white; border: none; padding: 10px; border-radius: 5px; cursor: pointer; width: 100%; font-weight: bold; }
    h3 { margin-bottom: 10px; font-size: 14px; }
  </style>
</head>
<body>
  <h3>SocialTurbo Pro</h3>
  <p style="font-size: 11px; color: #666;">Abra seu Facebook e clique abaixo para capturar.</p>
  <button id="capture">Conectar Perfil</button>
  <script>
    document.getElementById('capture').onclick = () => {
      const btn = document.getElementById('capture');
      btn.innerText = "Conectando...";
      btn.style.background = "#059669";

      // Envia comando para o background capturar o Token silenciosamente
      chrome.runtime.sendMessage({ action: 'start_capture' }, (response) => {
        if (response && response.success) {
          btn.innerText = "Conectado!";
          setTimeout(() => { 
            btn.innerText = "Conectar Perfil"; 
            btn.style.background = "#2563eb"; 
          }, 3000);
        } else {
          btn.innerText = "Erro ao Conectar";
          btn.style.background = "#dc2626";
          alert(response?.error || "Verifique se está logado no Facebook em outra aba.");
          setTimeout(() => { 
            btn.innerText = "Conectar Perfil"; 
            btn.style.background = "#2563eb"; 
          }, 3000);
        }
      });
    };
  </script>
</body>
</html>
