<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin | Rifa Online</title>
    <link rel="stylesheet" href="/src/style.css">
</head>
<body class="p-4 md:p-8 bg-slate-50">
    
    <!-- Login Screen -->
    <div id="login-screen" class="min-h-screen flex items-center justify-center p-4 bg-slate-900">
        <div class="bg-white p-12 rounded-[3rem] shadow-2xl w-full max-w-md border border-white/10">
            <div class="text-center mb-10">
                <h1 class="text-4xl font-black text-slate-900 uppercase italic tracking-tighter mb-2">PAINEL ADMIN</h1>
                <p class="text-slate-400 font-bold text-[10px] uppercase tracking-[0.2em] italic">Acesse Management System</p>
            </div>
            <form id="login-form" class="space-y-6">
                <div>
                    <label class="block text-[10px] font-black uppercase tracking-widest text-slate-500 mb-2 italic">E-MAIL</label>
                    <input type="email" id="email" required class="w-full bg-slate-50 border-2 border-slate-100 rounded-2xl px-6 py-5 font-bold focus:border-blue-500 transition-all outline-none text-slate-900" placeholder="seu@email.com">
                </div>
                <div>
                    <label class="block text-[10px] font-black uppercase tracking-widest text-slate-500 mb-2 italic">SENHA</label>
                    <input type="password" id="password" required class="w-full bg-slate-50 border-2 border-slate-100 rounded-2xl px-6 py-5 font-bold focus:border-blue-500 transition-all outline-none text-slate-900" placeholder="••••••••">
                </div>
                <button type="submit" class="w-full bg-slate-900 text-white rounded-2xl py-6 font-black text-xs uppercase italic tracking-widest hover:bg-black transition-all shadow-2xl">
                    ENTRAR NO PAINEL
                </button>
            </form>
        </div>
    </div>

    <!-- Admin Content -->
    <div id="admin-panel" class="hidden min-h-screen pb-20">
        <!-- Top Bar -->
        <nav class="bg-slate-900 text-white px-8 py-4 flex justify-between items-center mb-12 shadow-2xl">
            <div class="flex items-center gap-4">
                <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center font-black italic">RT</div>
                <span class="font-black italic uppercase tracking-tighter text-lg">RIFA ONLINE PRO</span>
            </div>
            <button id="logout-btn" class="text-slate-400 hover:text-white transition-colors group">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="group-hover:translate-x-1 transition-transform"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
            </button>
        </nav>

        <div class="max-w-7xl mx-auto px-6">
            <div class="flex flex-col md:flex-row justify-between items-start md:items-end mb-10 gap-6">
                <div>
                    <h1 class="text-5xl font-black text-slate-900 uppercase italic tracking-tighter leading-none mb-2">GERENCIAR RIFAS</h1>
                    <p class="text-slate-400 font-bold uppercase text-[10px] tracking-[0.3em] italic">Controle de reservas e status dos participantes</p>
                </div>
                <!-- Stats -->
                <div class="flex gap-4 overflow-x-auto pb-4 w-full md:w-auto">
                    <div class="bg-white px-8 py-4 rounded-2xl border border-slate-100 shadow-sm min-w-[160px]">
                        <p class="text-[9px] font-black uppercase tracking-widest text-slate-400 mb-1">TOTAL PAGO</p>
                        <h3 id="stat-arrecadado" class="text-xl font-black text-green-600 tracking-tighter">R$ 0,00</h3>
                    </div>
                </div>
            </div>

            <!-- Settings Card -->
            <div class="bg-white rounded-[2rem] shadow-xl border border-slate-100 p-8 mb-10">
                <h2 class="text-xl font-black text-slate-900 uppercase italic tracking-tighter mb-6 flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" class="text-blue-600"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
                    AJUSTAR RIFA
                </h2>
                <form id="config-form" class="grid grid-cols-1 md:grid-cols-3 gap-6">
                    <div>
                        <label class="block text-[10px] font-black uppercase tracking-widest text-slate-400 mb-2">TÍTULO DA RIFA</label>
                        <input type="text" id="cfg-nome" class="w-full bg-slate-50 border border-slate-100 rounded-xl px-4 py-3 font-bold text-slate-900 focus:border-blue-500 outline-none">
                    </div>
                    <div>
                        <label class="block text-[10px] font-black uppercase tracking-widest text-slate-400 mb-2">VALOR (EX: 20)</label>
                        <input type="number" id="cfg-valor" class="w-full bg-slate-50 border border-slate-100 rounded-xl px-4 py-3 font-bold text-slate-900 focus:border-blue-500 outline-none">
                    </div>
                    <div>
                        <label class="block text-[10px] font-black uppercase tracking-widest text-slate-400 mb-2">LOGO URL (POSTIMG)</label>
                        <input type="text" id="cfg-logo" class="w-full bg-slate-50 border border-slate-100 rounded-xl px-4 py-3 font-bold text-slate-900 focus:border-blue-500 outline-none">
                    </div>
                    <div>
                        <label class="block text-[10px] font-black uppercase tracking-widest text-slate-400 mb-2">COR DESTAQUE</label>
                        <div class="flex gap-2">
                            <input type="color" id="cfg-cor" class="w-14 h-12 bg-transparent cursor-pointer border-2 border-slate-100 rounded-xl p-1 transition-all hover:border-blue-500">
                            <input type="text" id="cfg-cor-text" class="flex-1 bg-slate-50 border border-slate-100 rounded-xl px-4 py-3 font-bold text-slate-900 focus:border-blue-500 outline-none uppercase" placeholder="#2563EB">
                        </div>
                    </div>
                    <div class="md:col-span-2">
                        <label class="block text-[10px] font-black uppercase tracking-widest text-slate-400 mb-2">DESCRIÇÃO CURTA</label>
                        <input type="text" id="cfg-desc" class="w-full bg-slate-50 border border-slate-100 rounded-xl px-4 py-3 font-bold text-slate-900 focus:border-blue-500 outline-none">
                    </div>
                    <button type="submit" class="md:col-span-3 bg-blue-600 text-white font-black py-4 rounded-xl uppercase italic tracking-widest shadow-lg shadow-blue-200 hover:bg-blue-700 transition-all">
                        SALVAR ALTERAÇÕES
                    </button>
                </form>
            </div>

            <!-- Main Table Card -->
            <div class="bg-white rounded-[2.5rem] shadow-2xl border border-slate-100 overflow-hidden">
                <div class="p-8 border-b border-slate-50 flex flex-col md:flex-row justify-between items-center gap-4">
                    <div class="flex gap-4">
                        <div class="bg-blue-50 text-blue-600 px-4 py-2 rounded-xl text-[10px] font-black uppercase tracking-widest italic">PAGOS: <span id="stat-pagos">0</span></div>
                        <div class="bg-yellow-50 text-yellow-600 px-4 py-2 rounded-xl text-[10px] font-black uppercase tracking-widest italic">RESERVADOS: <span id="stat-reservados">0</span></div>
                    </div>
                    <div class="bg-slate-50 text-slate-400 px-4 py-2 rounded-xl text-[10px] font-black uppercase tracking-widest italic">DISPONÍVEIS: <span id="stat-disponiveis">0</span></div>
                </div>

                <div class="overflow-x-auto">
                    <table class="w-full text-left">
                        <thead class="bg-slate-50/50 text-[10px] font-black uppercase tracking-widest text-slate-400 border-b border-slate-50">
                            <tr>
                                <th class="px-10 py-6">Nº / CLIENTE</th>
                                <th class="px-10 py-6">WHATSAPP</th>
                                <th class="px-10 py-6">STATUS</th>
                                <th class="px-10 py-6 text-right">AÇÕES</th>
                            </tr>
                        </thead>
                        <tbody id="admin-table-body" class="divide-y divide-slate-50 font-bold text-sm">
                            <!-- JS Inject -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="/src/admin.js"></script>
</body>
</html>
